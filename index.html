<script type="importmap">

<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo">✺</span>
        <div class="sidebar-brand-text">
          <div class="sidebar-name" lang="kn">ಚಿತ್ರ ಬಿಡ್ಸುದ್ ಕಲಿ</div>
          <div class="sidebar-tag">learn · exaggerate · draw</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="nav"><!-- built by nav.js --></nav>

      <button class="install-btn" id="install-btn" hidden aria-label="Install app">
        <span class="install-icon">⬇</span> Install app
      </button>

      <div class="sidebar-footer">
        Built with <svg class="love-heart" viewBox="0 0 24 24" fill="currentColor" aria-label="love"><path d="M12 21s-6.8-4.35-9.5-8.5C-.25 8 2.25 3.5 7 3.5c2.25 0 3.85 1.1 5 3 1.15-1.9 2.75-3 5-3 4.75 0 7.25 4.5 4.5 9-2.7 4.15-9.5 8.5-9.5 8.5z"/></svg>

    <div class="main-area">
      <header class="topbar-mobile">
        <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>

          <span class="sidebar-logo">✺</span>

        </span>
      </header>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker — enables PWA install + offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => console.warn('SW register failed:', err));
      });
    }

    // Capture the beforeinstallprompt event so we can show our own Install button
    let deferredInstall = null;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstall = e;
      if (installBtn) installBtn.hidden = false;
    });
    installBtn?.addEventListener('click', async () => {
      if (!deferredInstall) return;
      deferredInstall.prompt();
      const { outcome } = await deferredInstall.userChoice;
      if (outcome === 'accepted') installBtn.hidden = true;
      deferredInstall = null;
    });
    window.addEventListener('appinstalled', () => { if (installBtn) installBtn.hidden = true; });
  </script>
</body>
